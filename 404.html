<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Your Name</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #111;
      background: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wrap { text-align: left; }
    .code {
      font-size: 11px;
      font-weight: 400;
      color: #aaa;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 8px;
    }
    p {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }
    a {
      font-size: 13px;
      color: #888;
      text-decoration: none;
    }
    a:hover { color: #111; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>페이지를 찾을 수 없습니다.</h1>
    <p>주소가 잘못되었거나 삭제된 페이지입니다.</p>
    <a href="/">← 홈으로</a>
  </div>
</body>
</html>
