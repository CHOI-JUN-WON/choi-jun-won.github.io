            </div>

            <div id="2s" class="sentence2">
                <div style="margin: auto;display: flex;flex-direction: column;">
                    <p class="info_text">최준원 CHOI JUN WON</p>
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"

                        <path d="M3 13a20 20 0 0 0 18 0"></path>
                    </svg>
                    <br>
                    <span class="sub_text" style="margin-left: 0;">팀 백야</span>

                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"

            </div>

            <div id="3s" class="sentence3">

            </div>

            <div id="4s" class="sentence4">
                <div style="margin: auto;display: flex;flex-direction: column;">

                    <p class="sub_text">모람이라는 이름을 가진 AI와 대화하는 웹사이트 입니다.</p>
                    <p class="sub_text">이 프로젝트는 기존 무엇이든 물어볼수있는 AI와 다르게, 온디바이스 AI라는 점입니다. 이것은 사용자가 부담없이 AI한테 고민상담을 하게 도와 줄것입니다.</p>
                    <div class="main_page_button" onclick="window.location.href = '/MoramAI/'">
                        <p>페이지로 가기</p>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>

<script>
const cards = [
  document.getElementById("1s"),
  document.getElementById("2s"),
  document.getElementById("3s"),
  document.getElementById("4s")
];

const offsets = [
  { x: 0, y: 0 },
  { x: 20, y: 20 },
  { x: 40, y: 40 },
  { x: 60, y: 60 }
];

const interval = 5000;

function updateCards() {
  for (let i = 0; i < cards.length; i++) {
    const card = cards[i];
    card.style.transition = "transform 0.5s";
    card.style.transform = `translate(${offsets[i].x}px, ${offsets[i].y}px)`;
    card.style.zIndex = `${cards.length - i}`;
  }
}

function slideNext() {
  const first = cards.shift();
  cards.push(first);
  updateCards();
  setTimeout(slideNext, interval);
}

updateCards();
setTimeout(slideNext, interval);
</script>

<style>

</style>
